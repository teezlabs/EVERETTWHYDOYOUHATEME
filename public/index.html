<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Everett Hate Tracker</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      gap: 32px;
    }

    h1 {
      font-size: 2rem;
      text-align: center;
      color: #ff4444;
      text-shadow: 0 0 20px #ff000088;
    }

    .count-display {
      font-size: 6rem;
      font-weight: 900;
      color: #ff2222;
      text-shadow: 0 0 40px #ff000099;
      line-height: 1;
      transition: transform 0.1s;
    }

    .count-display.bump {
      transform: scale(1.3);
    }

    .label {
      font-size: 1.1rem;
      color: #888;
      text-align: center;
    }

    button {
      padding: 20px 48px;
      font-size: 1.4rem;
      font-weight: bold;
      background: #ff2222;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 0 30px #ff000066;
      transition: transform 0.1s, box-shadow 0.1s, background 0.1s;
      user-select: none;
    }

    button:hover {
      background: #ff4444;
      box-shadow: 0 0 50px #ff0000aa;
    }

    button:active {
      transform: scale(0.95);
      box-shadow: 0 0 15px #ff000066;
    }

    .last-clicked {
      font-size: 0.85rem;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>How Much Everett Hates You</h1>
  <div class="count-display" id="count">0</div>
  <div class="label">times</div>
  <button onclick="registerHate()">I HATE YOU</button>
  <div class="last-clicked" id="last-clicked"></div>

  <script>
    async function fetchCount() {
      const res = await fetch('/api/count');
      const data = await res.json();
      updateUI(data);
    }

    async function registerHate() {
      const res = await fetch('/api/click', { method: 'POST' });
      const data = await res.json();
      updateUI(data);
      bumpCount();
    }

    function updateUI(data) {
      document.getElementById('count').textContent = data.count;
      if (data.lastClicked) {
        const d = new Date(data.lastClicked);
        document.getElementById('last-clicked').textContent =
          `Last clicked: ${d.toLocaleString()}`;
      }
    }

    function bumpCount() {
      const el = document.getElementById('count');
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 150);
    }

    fetchCount();
  </script>
</body>
</html>
